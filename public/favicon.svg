<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="anvil-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="spark-grad" x1="32" y1="8" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#anvil-grad)" opacity="0.12"/>
  <rect x="4" y="4" width="56" height="56" rx="12" stroke="url(#anvil-grad)" stroke-width="2" fill="none"/>
  <!-- Anvil base -->
  <path d="M16 44 L48 44 L50 48 L14 48 Z" fill="url(#anvil-grad)" opacity="0.9"/>
  <path d="M20 44 L44 44 L44 40 L20 40 Z" fill="url(#anvil-grad)"/>
  <!-- Anvil top (horn) -->
  <path d="M18 40 L46 40 L48 36 L44 32 L20 32 L16 36 Z" fill="url(#anvil-grad)" opacity="0.8"/>
  <!-- Neural circuit / brain spark -->
  <circle cx="32" cy="22" r="4" fill="url(#spark-grad)"/>
  <circle cx="22" cy="28" r="2.5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="42" cy="28" r="2.5" fill="#4F46E5" opacity="0.7"/>
  <circle cx="26" cy="16" r="2" fill="#06B6D4" opacity="0.5"/>
  <circle cx="38" cy="16" r="2" fill="#4F46E5" opacity="0.5"/>
  <!-- Neural connections -->
  <line x1="32" y1="22" x2="22" y2="28" stroke="#06B6D4" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="22" x2="42" y2="28" stroke="#4F46E5" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="22" x2="26" y2="16" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="22" x2="38" y2="16" stroke="#4F46E5" stroke-width="1" opacity="0.4"/>
  <line x1="22" y1="28" x2="20" y2="32" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <line x1="42" y1="28" x2="44" y2="32" stroke="#4F46E5" stroke-width="1" opacity="0.4"/>
  <!-- Spark / forge glow -->
  <path d="M30 14 L32 10 L34 14 L32 12 Z" fill="#06B6D4" opacity="0.8"/>
  <path d="M28 12 L32 6 L36 12" stroke="#06B6D4" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
